<div class="card project-card">
    <div class="card-body">
        <img [src]="imageSrc" class="card-img-top" alt="No Image Found" width="100%" height="300px">
        <h5 class="card-title mt-2">{{title}}</h5>
        <p class="card-text text-muted">
            {{description}}
        </p>
    </div>

    <div class="card-footer bg-transparent border-0 margin-auto d-flex gap-2">
        <a [routerLink]="link" class="btn btn-outline-dark w-100">Demo</a>
    </div>
</div>
