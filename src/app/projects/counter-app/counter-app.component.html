<app-header></app-header>

<main class="counter-main container-fluid bg-props d-flex flex-column align-items-center justify-content-center px-3">

    <!-- Heading -->
    <div class="row justify-content-center w-100">
        <div class="col-12 col-md-10 col-lg-8">
            <app-heading [heading]="profileCardHeading" [subHeading]="profileCardSubHeading"></app-heading>
        </div>
    </div>

    <!-- Counter Card -->
    <div class="row justify-content-center w-100 mt-3">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div class="card shadow-lg">
                <div class="card-body text-center p-4">

                    <!-- Counter Display -->
                    <div class="mb-4">
                        <h1 class="display-3 fw-bold text-danger">{{ initialCount() }}</h1>
                        <p class="text-muted mb-0">Current Count</p>
                    </div>

                    <!-- Buttons -->
                    <div class="d-flex justify-content-center gap-3">
                        <button class="btn btn-outline-danger px-4" (click)="decreaseCount()">
                            <i class="fa-solid fa-minus"></i>
                        </button>
                        <button class="btn btn-outline-secondary px-4" (click)="resetCount()">
                            <i class="fa-solid fa-rotate-left"></i> Reset
                        </button>
                        <button class="btn btn-outline-success px-4" (click)="increaseCount()">
                            <i class="fa-solid fa-plus"></i>
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <!-- Status Alert -->
    <div class="row justify-content-center w-100 mt-3">
        <div class="col-12 col-sm-8 col-md-6 col-lg-4">
            <div [class]="countAlertClass() + ' text-center mb-0'" role="alert">
                {{ countValueString() }}
            </div>
        </div>
    </div>

</main>

<app-footer></app-footer>
